name: Rock Paper Scissors CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Run Tests with Coverage
      run: npm test

  docs-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install MkDocs
      run: pip install mkdocs-material
      
    - name: Build and Deploy Docs to GitHub Pages
      run: mkdocs gh-deploy --force

    - name: Cloud Deployment Placeholder
      run: |
        echo "Simulating Cloud Deployment of the Web App..."
        # This is where you would add steps to deploy to Azure/AWS/Linode
        # For a web app, static hosting on GitHub Pages is often sufficient
        echo "Deployment to Cloud Storage complete."
