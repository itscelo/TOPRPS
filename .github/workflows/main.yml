name: Rock Paper Scissors CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Run Tests with Coverage
      run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install MkDocs
      run: pip install mkdocs-material
      
    - name: Prepare Deployment Directory
      run: |
        # 1. Build documentation first (this cleans the 'site' directory)
        mkdocs build -d site
        
        # 2. Create app directory AFTER building docs
        mkdir -p site/app
        
        # 3. Copy web application files
        cp -r index.html styles.css rockpaperscissors.js images site/app/
        
        echo "Deployment directory prepared successfully."
        
    - name: Deploy to GitHub Pages (Cloud Hosting)
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
