name: Rock Paper Scissors CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Run Tests with Coverage
      run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
        
    - name: Install MkDocs
      run: pip install mkdocs-material
      
    - name: Prepare Deployment Directory
      run: |
        mkdir -p site/app
        # Build documentation into the root of the 'site' folder
        mkdocs build -d site
        # Copy the web application into a subfolder 'app' for cloud access
        cp -r index.html styles.css rockpaperscissors.js images site/app/
        # Add a placeholder for external Cloud Server deployment
        echo "Mirroring to Cloud Infrastructure (AWS/Azure/Linode)..."
        
    - name: Deploy to GitHub Pages (Cloud Hosting)
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./site
