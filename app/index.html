<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RockPaperScissors</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="rockpaperscissors.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1 class="title">Rock Paper Scissors</h1>
    <div class="container">
      <div id="humanScore">0</div>
      <div class="buttonColor">
        <button id="rock">
          <img
            src="images/moai_1f5ff.png"
            width="20px;"
            height="20px;"
            alt="angry looking rock"
          />
        </button>
      </div>
      <button id="scissors">
        <img
          src="images/black-scissors_2702.png"
          width="20px;"
          height="20px;"
          alt="scissors emoji"
        />
      </button>
      <button id="paper">
        <img
          src="images/memo_1f4dd.png"
          alt="paper emoji"
          width="20px;"
          height="20px;"
        />
      </button>
      <div id="computerScore">0</div>
    </div>

    <p id="output">Click your choice to start!</p>
    <p id="winner">First to five!</p>
  </body>
</html>
