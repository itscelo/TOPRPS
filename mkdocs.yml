site_name: Rock Paper Scissors CI/CD Project
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - content.code.copy

nav:
  - Home: index.md
  - Usage: usage.md
  - Testing: testing.md
  - Data Model: data-model.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
